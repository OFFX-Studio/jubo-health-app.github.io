<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="viva" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00b2c0"/>
      <stop offset="1" stop-color="#46cfe0"/>
    </linearGradient>
  </defs>
  <!-- rounded app-icon tile -->
  <rect width="24" height="24" rx="5.4" fill="url(#viva)"/>
  <!-- bubbles -->
  <rect x="19" y="4" width="1" height="1" fill="#ffffff" opacity=".85"/>
  <rect x="20" y="6" width="2" height="2" fill="#ffffff" opacity=".7"/>
  <!-- white Bobo (aquatic: fins + tail) -->
  <g fill="#ffffff">
    <rect x="9" y="4" width="6" height="1"/>
    <rect x="8" y="5" width="8" height="1"/>
    <rect x="7" y="6" width="10" height="1"/>
    <rect x="6" y="7" width="12" height="7"/>
    <rect x="7" y="14" width="10" height="1"/>
    <rect x="8" y="15" width="8" height="1"/>
    <!-- tail fan -->
    <rect x="10" y="16" width="4" height="1"/>
    <rect x="9" y="17" width="6" height="1"/>
    <rect x="8" y="18" width="2" height="1"/>
    <rect x="14" y="18" width="2" height="1"/>
    <!-- side fins -->
    <rect x="4" y="9" width="2" height="1"/>
    <rect x="3" y="10" width="2" height="1"/>
    <rect x="18" y="9" width="2" height="1"/>
    <rect x="19" y="10" width="2" height="1"/>
  </g>
  <!-- eyes -->
  <rect x="9" y="9" width="2" height="3" fill="#0e3a44"/>
  <rect x="13" y="9" width="2" height="3" fill="#0e3a44"/>
  <rect x="9" y="9" width="1" height="1" fill="#ffffff"/>
  <rect x="13" y="9" width="1" height="1" fill="#ffffff"/>
  <!-- cheeks -->
  <rect x="7" y="11" width="1" height="1" fill="#ff9db1"/>
  <rect x="16" y="11" width="1" height="1" fill="#ff9db1"/>
</svg>
